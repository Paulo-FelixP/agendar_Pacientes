<h2>Agenda de Consultas</h2>

<div class="filtros">
  <select name="filtroPaciente" [(ngModel)]="filtro.pacienteId">
    <option [ngValue]="0">Todos os pacientes</option>
    <option *ngFor="let p of pacientes" [ngValue]="p.id">{{ p.nome }}</option>
  </select>

  <select name="filtroMedico" [(ngModel)]="filtro.medico">
    <option value="">Todos os médicos</option>
    <option *ngFor="let nome of medicos | keyvalue" [value]="nome.key">{{ nome.key }}</option>
  </select>

  <select name="filtroStatus" [(ngModel)]="filtro.status">
    <option [ngValue]="undefined">Todos os status</option>
    <option value="AGENDADO">Agendado</option>
    <option value="CANCELADO">Cancelado</option>
  </select>

  <button type="button" (click)="carregar()">Filtrar</button>
  <button type="button" (click)="limparFiltro()">Limpar</button>
</div>

<table>
  <thead>
  <tr><th>Paciente</th><th>Médico</th><th>Data/Hora</th><th>Tipo</th><th>Status</th><th></th></tr>
  </thead>
  <tbody>
  <tr *ngFor="let a of agendamentos" [class.cancelado]="a.statusAgendamento === 'CANCELADO'">
    <td>{{ nomePaciente(a.pacienteId) }}</td>
    <td>{{ a.medico }}</td>
    <td>{{ a.dataHoraConsulta }}</td>
    <td>{{ a.tipoAtendimento }}</td>
    <td>{{ a.statusAgendamento }}</td>
    <td>
      <button type="button" *ngIf="a.statusAgendamento === 'AGENDADO'" (click)="cancelar(a)">
        Cancelar
      </button>
    </td>
  </tr>
  <tr *ngIf="agendamentos.length === 0">
    <td colspan="6">Nenhum agendamento encontrado.</td>
  </tr>
  </tbody>
</table>

<h3>Novo agendamento</h3>

<div class="opcoes-paciente">
  <label>
    <input type="radio" name="modoPaciente" [(ngModel)]="modoPaciente" value="existente">
    Paciente já cadastrado
  </label>
  <label>
    <input type="radio" name="modoPaciente" [(ngModel)]="modoPaciente" value="novo">
    Paciente novo
  </label>
</div>

<form (ngSubmit)="salvar()">

  <select *ngIf="modoPaciente === 'existente'" name="pacienteId" [(ngModel)]="novo.pacienteId" required>
    <option [ngValue]="0" disabled>Selecione o paciente</option>
    <option *ngFor="let p of pacientes" [ngValue]="p.id">{{ p.nome }}</option>
  </select>

  <ng-container *ngIf="modoPaciente === 'novo'">
    <input name="novoNome" [(ngModel)]="novoPaciente.nome" placeholder="Nome do paciente" required>
    <input name="novoTelefone" [(ngModel)]="novoPaciente.telefone" placeholder="Telefone" required>
    <input name="novoCpf" [(ngModel)]="novoPaciente.cpf" placeholder="CPF" required>
    <input name="novoEmail" [(ngModel)]="novoPaciente.email" placeholder="E-mail (opcional)">
  </ng-container>

  <select name="medico" [(ngModel)]="novo.medico" required>
    <option value="" disabled>Selecione o médico</option>
    <option *ngFor="let nome of medicos | keyvalue" [value]="nome.key">
      {{ nome.key }} — {{ nome.value }}
    </option>
  </select>

  <input type="datetime-local" name="dataHoraConsulta" [(ngModel)]="novo.dataHoraConsulta" required>

  <select name="tipoAtendimento" [(ngModel)]="novo.tipoAtendimento" required>
    <option value="PRESENCIAL">Presencial</option>
    <option value="ONLINE">Online</option>
  </select>

  <button type="submit">Agendar</button>
</form>

<p class="erro" *ngIf="erro">{{ erro }}</p>
