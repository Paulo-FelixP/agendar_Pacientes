<h2>Pacientes</h2>

<form (ngSubmit)="salvar()">
  <input name="nome" [(ngModel)]="novo.nome" placeholder="Nome" required>
  <input name="telefone" [(ngModel)]="novo.telefone" placeholder="Telefone" required>
  <input name="cpf" [(ngModel)]="novo.cpf" placeholder="CPF" required>
  <input name="email" [(ngModel)]="novo.email" placeholder="E-mail (opcional)">
  <button type="submit">Cadastrar paciente</button>
</form>

<p class="erro" *ngIf="erro">{{ erro }}</p>

<table>
  <thead>
  <tr><th>Nome</th><th>Telefone</th><th>CPF</th><th>E-mail</th></tr>
  </thead>
  <tbody>
  <tr *ngFor="let p of pacientes">
    <td>{{ p.nome }}</td>
    <td>{{ p.telefone }}</td>
    <td>{{ p.cpf }}</td>
    <td>{{ p.email }}</td>
  </tr>
  </tbody>
</table>
